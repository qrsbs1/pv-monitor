<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>光伏储能数据采集与追光控制系统</title>
<style>
  :root { --bg: #0a0e27; --card: #111640; --border: #1e2358; --accent: #00d4aa; --text: #c8d6e5; --sub: #8395a7; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
  .hero { text-align: center; padding: 50px 20px 20px; }
  .hero .icon { font-size: 56px; margin-bottom: 12px; }
  .hero h1 { font-size: 28px; letter-spacing: 3px; }
  .hero h1 span { color: var(--accent); }
  .hero .subtitle { color: var(--sub); font-size: 13px; line-height: 1.8; margin-top: 10px; }
  .hero .arch { display: inline-block; margin-top: 14px; padding: 6px 20px; border: 1px solid var(--border); border-radius: 20px; color: var(--sub); font-size: 11px; background: var(--card); }
  .cards { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; max-width: 720px; width: 100%; padding: 20px; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 28px 20px; text-align: center; transition: border-color 0.3s, transform 0.2s; text-decoration: none; color: inherit; display: block; }
  .card:hover { border-color: var(--accent); transform: translateY(-3px); }
  .card .ico { font-size: 40px; margin-bottom: 10px; }
  .card h2 { font-size: 18px; margin-bottom: 6px; }
  .card p { color: var(--sub); font-size: 12px; line-height: 1.5; }
  .badge { display: inline-block; margin-top: 10px; padding: 3px 12px; border-radius: 10px; font-size: 11px; }
  .badge.local { background: rgba(69,170,242,0.12); color: #45aaf2; }
  .badge.public { background: rgba(0,212,170,0.12); color: var(--accent); }
  .footer { margin-top: auto; padding: 20px; text-align: center; color: var(--sub); font-size: 10px; opacity: 0.4; }
  @media (max-width: 600px) { .cards { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div class="hero">
  <div class="icon">☀️</div>
  <h1>光伏储能<span>数据采集</span>与<span>追光控制</span>系统</h1>
  <div class="subtitle">基于 STM32 + ESP8266 + MQTT 协议的物联网光伏监测方案<br>支持实时监控 · 历史回溯 · 统计分析 · 数据导出</div>
  <div class="arch">ESP8266 → MQTT → Node.js → 网页看板</div>
</div>
<div class="cards">
  <a class="card" href="/pv-monitor/">
    <div class="ico">📊</div><h2>实时数据看板</h2>
    <p>ESP8266 实时推送 · MQTT 直连 · 动态趋势曲线</p>
    <span class="badge public">公网 · 永久在线</span>
  </a>
  <a class="card" href="/pv-monitor/realtime.html">
    <div class="ico">📊</div><h2>实时数据看板（备用）</h2>
    <p>同上，带返回按钮</p>
    <span class="badge public">公网 · 永久在线</span>
  </a>
</div>
<div class="footer">光伏储能数据采集与追光控制系统 · 嵌入式比赛作品</div>
</body>
</html>
