<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>光伏储能数据采集与追光控制系统</title>
<style>
  :root {
    --bg: #0a0e27; --card: #111640; --border: #1e2358; --accent: #00d4aa;
    --text: #c8d6e5; --sub: #8395a7;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;
    min-height: 100vh; display: flex; flex-direction: column; align-items: center;
  }
  .hero { text-align: center; padding: 60px 20px 30px; }
  .hero .icon { font-size: 64px; margin-bottom: 16px; }
  .hero h1 { font-size: 32px; letter-spacing: 3px; margin-bottom: 8px; }
  .hero h1 span { color: var(--accent); }
  .hero .subtitle { color: var(--sub); font-size: 14px; margin-top: 8px; }
  .hero .badge {
    display: inline-block; margin-top: 16px; padding: 4px 16px;
    border: 1px solid var(--accent); border-radius: 20px;
    color: var(--accent); font-size: 12px; letter-spacing: 1px;
  }

  .cards {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(320px,1fr));
    gap: 20px; max-width: 800px; width: 100%; padding: 20px;
  }
  .card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 14px; padding: 30px 24px; text-align: center;
    transition: border-color 0.3s, transform 0.2s;
    text-decoration: none; color: inherit; display: block;
  }
  .card:hover {
    border-color: var(--accent); transform: translateY(-2px);
  }
  .card .emoji { font-size: 48px; margin-bottom: 12px; }
  .card h2 { font-size: 20px; margin-bottom: 8px; }
  .card p { color: var(--sub); font-size: 13px; line-height: 1.6; margin-bottom: 16px; }
  .card .tag {
    display: inline-block; padding: 2px 10px; border-radius: 10px;
    font-size: 11px; margin: 2px;
  }
  .tag.green { background: rgba(0,212,170,0.12); color: var(--accent); }
  .tag.blue  { background: rgba(69,170,242,0.12); color: #45aaf2; }
  .tag.gold  { background: rgba(247,183,49,0.12); color: #f7b731; }

  .section-title {
    text-align: center; padding: 10px;
    color: var(--sub); font-size: 12px; letter-spacing: 2px;
  }

  .footer {
    margin-top: auto; padding: 24px; text-align: center;
    color: var(--sub); font-size: 11px; opacity: 0.5;
  }
</style>
</head>
<body>

<div class="hero">
  <div class="icon">☀️</div>
  <h1>光伏储能<span>数据采集</span>与<span>追光控制</span>系统</h1>
  <div class="subtitle">基于 STM32 + ESP8266 + MQTT 的物联网光伏监测方案</div>
  <div class="badge">嵌入式比赛作品</div>
</div>

<div class="section-title">▼ 点击进入对应看板 ▼</div>

<div class="cards">
  <!-- 看板 A：实时数据 -->
  <a class="card" href="https://qrsbs1.github.io/pv-monitor/realtime.html">
    <div class="emoji">📊</div>
    <h2>实时数据看板</h2>
    <p>ESP8266 实时推送 · MQTT 直连 · 动态趋势曲线</p>
    <span class="tag green">实时监控</span>
    <span class="tag blue">ECharts</span>
    <span class="tag gold">永久在线</span>
  </a>

  <!-- 看板 B：完整云平台 -->
  <a class="card" id="cloudLink" href="#" onclick="return goCloud()">
    <div class="emoji">☁️</div>
    <h2>完整云平台</h2>
    <p>历史回溯 · 统计分析 · CSV 导出 · 数据库存储</p>
    <span class="tag green">历史数据</span>
    <span class="tag blue">数据分析</span>
    <span class="tag gold">一应俱全</span>
  </a>
</div>

<div class="footer">
  光伏储能数据采集与追光控制系统 · 嵌入式比赛作品
</div>

<script>
// 云平台地址（启动 start.bat 后会得到一个 trycloudflare 地址，更新下面这行）
const CLOUD_URL = localStorage.getItem('pv_cloud_url') || '';

function goCloud() {
  if (CLOUD_URL) {
    window.open(CLOUD_URL, '_blank');
  } else {
    var url = prompt(
      '请输入云平台地址：\n\n' +
      '（启动 start.bat 后，黑窗口中会显示 https://xxx.trycloudflare.com）\n\n' +
      '如果在本机运行，请输入：http://localhost:3000',
      'http://localhost:3000'
    );
    if (url) {
      localStorage.setItem('pv_cloud_url', url);
      window.open(url, '_blank');
    }
  }
  return false;
}

// 如果之前设置过，自动更新链接
if (CLOUD_URL) {
  document.getElementById('cloudLink').href = CLOUD_URL;
  document.getElementById('cloudLink').onclick = null;
}
</script>
</body>
</html>
